<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Form | BMW Motors</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo">
    <h3>Emran Softech Company</h3>
  </div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#services">Services</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<section class="admission-section">
  <div class="admission-container">
    <h2>Service Admission Form</h2>

    <form class="admission-form">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="tel" placeholder="Phone Number" required>

      <select required>
        <option value="">Select Service</option>
        <option>Digital Marketing</option>
        <option>Web Development</option>
        <option>Graphic Design</option>
      </select>

      <textarea rows="5" placeholder="Additional Details"></textarea>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</section>

<footer class="footer">
  <p>© 2026 Emran Softech Company. All Rights Reserved.</p>
  <div class="social-links">
    <a href="#">Facebook</a>
    <a href="#">Instagram</a>
    <a href="#">LinkedIn</a>
  </div>
</footer>

</body>
</html>
